<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
   <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth:1280; sourceHeight:720; displayWidth:1280; displayHeight:720;">
      
      <a-marker type="pattern" url="pattern-marker.patt">
        
        <a-video src="https://vjs.zencdn.net/v/oceans.mp4" 
                 width="1.6" height="0.9" 
                 position="0 0 0" 
                 rotation="-90 0 0"></a-video>

        <a-text value="Nova Print AR" position="0 0.8 0" align="center" rotation="-90 0 0" color="#ff7675"></a-text>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
